[package]
name = "userprogram"
version = "0.16.0"
edition = "2024"

[features]
default = ["mp4-aac"]
mp4-aac = ["dep:symphonia-core", "dep:symphonia-codec-aac"]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

