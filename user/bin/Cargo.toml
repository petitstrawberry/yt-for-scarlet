[dependencies]
scarlet_std = { path = "../lib/std", features = ["alloc_debug"] }
scpm = { path = "../lib/scpm" }
framebuffer = { path = "../lib/framebuffer" }
gpu = { path = "../lib/gpu" }
sws_protocol = { path = "../lib/sws_protocol" }
sws-client = { path = "../lib/sws-client" }
scarlet-ui = { path = "../lib/scarlet-ui" }
scarlet-ui-macros = { path = "../lib/scarlet-ui-macros" }
slint-scarlet = { path = "../lib/slint-scarlet" }
scarlet-desktop-config = { path = "../lib/scarlet-desktop-config" }
sbus = { path = "../lib/sbus" }
sbus-client = { path = "../lib/sbus-client" }
vm-fdt = { version = "0.3", default-features = false, features = ["alloc"] }
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
serde-json-core = { package = "serde-json-core", version = "0.6", default-features = false }
rust_h264 = { git = "https://github.com/petitstrawberry/rust_h264.git", rev = "edcf83ee2c99fa0087fa2d85a492a4c313e11ed0", default-features = false }
symphonia-core = { git = "https://github.com/petitstrawberry/Symphonia.git", rev = "71f92f0bc0fdd9d4f2a77129a543ee6c99611009", default-features = false, optional = true }
symphonia-codec-aac = { git = "https://github.com/petitstrawberry/Symphonia.git", rev = "71f92f0bc0fdd9d4f2a77129a543ee6c99611009", default-features = false, optional = true }
slint = { version = "1.14", default-features = false, features = [
    "unsafe-single-threaded",
    "renderer-software",
    "libm",
    "compat-1-2"
] }

[build-dependencies]
slint-build = "1.14"
